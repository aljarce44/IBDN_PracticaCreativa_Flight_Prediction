apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask
  namespace: flight-stack
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flask
  template:
    metadata:
      labels:
        app: flask
    spec:
      enableServiceLinks: false
      containers:
        - name: flask
          image: localhost:5000/practica_creativa-flask:latest
          imagePullPolicy: IfNotPresent
          workingDir: /app/resources/web
          command: ["python"]
          args: ["predict_flask.py"]
          ports:
            - containerPort: 5001
          env:
            - name: PROJECT_HOME
              value: /app
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: kafka:29092
            - name: CASSANDRA_HOST
              value: cassandra
            - name: MINIO_ENDPOINT
              value: http://minio:9000
            - name: MINIO_ACCESS_KEY
              value: admin
            - name: MINIO_SECRET_KEY
              value: password123
---
apiVersion: v1
kind: Service
metadata:
  name: flask
  namespace: flight-stack
spec:
  type: NodePort
  selector:
    app: flask
  ports:
    - name: http
      port: 5001
      targetPort: 5001
      nodePort: 30081
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: spark-streaming
  namespace: flight-stack
spec:
  replicas: 1
  selector:
    matchLabels:
      app: spark-streaming
  template:
    metadata:
      labels:
        app: spark-streaming
    spec:
      enableServiceLinks: false
      containers:
        - name: spark-streaming
          image: localhost:5000/practica_creativa-spark:latest
          imagePullPolicy: IfNotPresent
          workingDir: /app
          command:
            - /opt/spark/bin/spark-submit
          args:
            - --master
            - local[1]
            - --packages
            - org.apache.spark:spark-sql-kafka-0-10_2.12:3.5.3,org.apache.hadoop:hadoop-aws:3.3.4,com.amazonaws:aws-java-sdk-bundle:1.12.262,org.apache.iceberg:iceberg-spark-runtime-3.5_2.12:1.6.1,com.datastax.spark:spark-cassandra-connector_2.12:3.5.1
            - --conf
            - spark.hadoop.fs.s3a.endpoint=http://minio:9000
            - --conf
            - spark.hadoop.fs.s3a.access.key=admin
            - --conf
            - spark.hadoop.fs.s3a.secret.key=password123
            - --conf
            - spark.hadoop.fs.s3a.path.style.access=true
            - --conf
            - spark.hadoop.fs.s3a.impl=org.apache.hadoop.fs.s3a.S3AFileSystem
            - --conf
            - spark.hadoop.fs.s3a.connection.ssl.enabled=false
            - --conf
            - spark.cassandra.connection.host=cassandra
            - resources/streaming_predictions_kafka_cassandra.py
            - s3a://lakehouse/models
          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: kafka:29092
            - name: CASSANDRA_HOST
              value: cassandra
            - name: MINIO_ENDPOINT
              value: http://minio:9000
            - name: MINIO_ACCESS_KEY
              value: admin
            - name: MINIO_SECRET_KEY
              value: password123